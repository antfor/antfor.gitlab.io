image: oven/bun:alpine
 
stages:
    - build
    - deploy

cache:
  key:
    files:
      - front/website/bun.lockb
  paths:
    - front/website/node_modules/

build:
  stage: build
  only:
    - master
    - dev
  before_script:
    #Website
    - cd ./front/website    
    - rm -rf dist    
    - bun install --no-progress
    - cd ../..
    #Compress
    - apk add --no-cache gzip brotli zstd
  script:
    #Website
    - cd ./front/website  
    - bun run build $BUILD_ARGS
    - cd ../..
    - mkdir -p build
    - cp -r ./front/website/dist/. build/
    #Compression
    - |
      find build -type f \
        -regex '.*\.\(htm\|html\|txt\|text\|js\|xml\|json\|mjs\|svg\|yaml\|yml\|toml\|css\|pdf\)$' \
        -exec gzip -f -k -9 {} + \
        -exec brotli -f -k -Z {} + \
        -exec zstd -f -k --ultra -22 -q {} +

  artifacts:
        paths:
          - build


pages_dev:
  stage: deploy
  only:
    - dev
  dependencies:
    - build
  environment:
    name: preview/dev
    url: https://antfor.gitlab.io/dev/
  script:
    - rm -rf public
    - mkdir -p public
    - cp -r build/. public/
    - ls ./public -R -A
    - echo "Pages accessible through ${CI_PAGES_URL}"
  artifacts:
    paths:
      - public
  pages:
    path_prefix: "dev"
 
pages:
  stage: deploy
  only:
    - master
  dependencies:
    - build
  environment: 
    name: Production
    url: https://anton-forsberg.com
  script:
    - rm -rf public
    - mkdir -p public
    - cp -r build/. public
    - ls ./public -R -A
    - echo "Pages accessible through ${CI_PAGES_URL}"
  artifacts:
    paths:
      - public

